# Render.com blueprint for the CogPrint backend + managed Postgres.
# Deploy: push to GitHub, then in Render "New → Blueprint" and point it at this repo.
# This provisions the web service and the database and wires DATABASE_URL for you.
#
# Secrets NOT set here (add them in the Render dashboard, never in git):
#   ANTHROPIC_API_KEY   — enables flashcards (optional)
#   COGPRINT_API_KEY    — set a long random value before any public traffic
services:
  - type: web
    name: cogprint-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cogprint-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your deployed frontend URL, e.g. https://cogprint.vercel.app
      - key: COGPRINT_API_KEY
        sync: false # set a long random string in the dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # optional — enables flashcard generation
      - key: COGPRINT_QGEN_MODEL
        value: claude-haiku-4-5 # cheaper default for prod; change if desired

databases:
  - name: cogprint-db
    plan: basic-256mb
    postgresMajorVersion: "16"
